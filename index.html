        }

            height: 80vh;

            background: var(--bg-color); 
            padding: 15px; 
            border-radius: 12px; 
            border: none; 
            align-content: start; 
        }

        .video-box {

            aspect-ratio: 16/9; 
            background: #000; 
            border-radius: 8px; 
            overflow: hidden; 
            position: relative; 
        }

            width: 100% !important; 
            height: 100% !important; 
            border: none; 
            position: absolute; 
            top: 0; 
            left: 0; 
        }
        
        .modes { 
            display: flex; 
            gap: 10px; 
            margin-top: 15px; 
            justify-content: center; 
            flex-wrap: wrap; 
        }
        
        .btn { 
            background: #333; 
            color: #fff; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 6px; 
            cursor: pointer; 
        }
        
        .btn:hover { 
            background: var(--accent-color); 
            color: #000; 
        }
        
        .pip-btn { 
            background: #ff4757 !important; 
        }
        
        .ch-btn { 
            background: #21262d; 
            padding: 16px 8px; 
            border-radius: 8px; 
            cursor: pointer; 
            text-align: center; 
            border: 1px solid #30363d; 
            transition: 0.3s; 
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .ch-btn:hover { 
            background: #30363d; 
            border-color: var(--accent-color); 
        }
        
        .ch-btn:hover strong { 
            color: #fff; 
        }
        
        .ch-btn img { 
            width: 34px; 
            height: 34px; 
            object-fit: contain; 
        }
        
        .ch-btn strong { 
            font-size: 13.2px; 
            font-weight: bold; 
            color: var(--accent-color); 
        }
        
        .input-box { 
            display: flex; 
            gap: 10px; 
            max-width: 1800px; 
            margin: 20px auto; 
        }
        
        #customUrlInput { 
            flex: 1; 
            padding: 15px; 
            background: var(--bg-color); 
            border: 1px solid #30363d; 
            color: white; 
            border-radius: 6px;

            background: var(--accent-color); 
            border: none; 
            padding: 15px 30px; 
            border-radius: 6px; 
            cursor: pointer; 
            font-weight: bold; 
            color: #000;

            currentMode = mode;
            videoEl.style.display = 'none';
            iframe.style.display = 'none';
            clapprEl.style.display = 'none';
            html5El.style.display = 'none';
            
            if (hls) { hls.destroy(); hls = null; }
            if (clapprInstance) { clapprInstance.destroy(); clapprInstance = null; }
            videoEl.pause();
            videoEl.src = "";
            videoEl.load();
            html5El.pause();
            html5El.src = "";
            iframe.src = "about:blank";

            if (mode === 'iframe') {
                iframe.src = url;
                iframe.style.display = 'block';
            } else if (mode === 'clappr') {
                clapprEl.style.display = 'block';
                clapprInstance = new Clappr.Player({source: url, parentId: "#clappr-container", width: '100%', height: '100%', autoPlay: true});
            } else if (mode === 'html5') {
                html5El.style.display = 'block';
                html5El.src = url;
                html5El.play();
            } else {
                videoEl.style.display = 'block';
                if (Hls.isSupported()) {
                    hls = new Hls();
                    hls.loadSource(url);
                    hls.attachMedia(videoEl);
                    hls.on(Hls.Events.MANIFEST_PARSED, () => videoEl.play());
                } else {
                    videoEl.src = url;
                    videoEl.play();
                }
            }
        }

        function playCustom() {
            const url = document.getElementById('customUrlInput').value;
            if(url) loadChannel(url, currentMode);
        }

        const container = document.getElementById('channelContainer');
        channels.forEach(ch => {
            const btn = document.createElement('div');
            btn.className = 'ch-btn';
            
            // যদি লোগো না থাকে বা লিংক খালি থাকে, তবে ডিফল্ট একটি টিভি আইকন ব্যবহার হবে
            const logoSrc = ch.logo && ch.logo.trim() !== "" ? ch.logo : "https://cdn-icons-png.flaticon.com/512/716/716428.png";

            btn.innerHTML = `
                <img src="${logoSrc}" alt="${ch.name}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/716/716428.png'">
                <strong>${ch.name}</strong>
            `;
            btn.onclick = () => loadChannel(ch.url, currentMode);
            container.appendChild(btn);
        });
    </script>
</body>
</html>
