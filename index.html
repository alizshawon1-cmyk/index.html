<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>SHAWON TV LIVE</title>
    <style>
        body { background: #0f0f0f; color: #fff; margin: 0; padding: 20px; font-family: sans-serif; }
        .main-wrapper { display: flex; gap: 20px; }
        
        /* ভিডিও প্লেয়ার সেকশন */
        #video-container { flex: 2; }
        video { width: 100%; border-radius: 10px; background: #000; min-height: 400px; }
        
        /* গ্রিড ডিজাইন (image_89ea10.png এর মতো) */
        .sidebar { flex: 1; background: #1a1d29; padding: 15px; border-radius: 10px; }
        .channel-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .channel-card { background: #fff; padding: 15px; border-radius: 8px; text-align: center; cursor: pointer; color: #000; font-weight: bold; transition: 0.3s; }
        .channel-card:hover { transform: scale(1.05); border: 2px solid #00d4ff; }
        .sub-text { font-size: 10px; color: #ff0055; display: block; margin-top: 5px; }
    </style>
</head>
<body>

<div class="main-wrapper">
    <div id="video-container">
        <video id="video" controls autoplay></video>
        <h2 id="channel-name">চ্যানেল নির্বাচন করুন</h2>
    </div>

    <div class="sidebar">
        <h3>চ্যানেল লিস্ট</h3>
        <div class="channel-grid">
            <!-- চ্যানেল কার্ডসমূহ -->
            <div class="channel-card" onclick="playChannel('https://stream.btv.gov.bd/hls/btv.m3u8', 'BTV')">
                BTV <span class="sub-text">SHAWON PLAY</span>
            </div>
            <div class="channel-card" onclick="playChannel('https://live.jamuna.tv/hls/live.m3u8', 'Jamuna TV')">
                Jamuna TV <span class="sub-text">SHAWON PLAY</span>
            </div>
            <div class="channel-card" onclick="playChannel('https://live.channel24bd.tv/hls/live.m3u8', 'Channel 24')">
                Channel 24 <span class="sub-text">SHAWON PLAY</span>
            </div>
            <!-- এভাবে বাকি চ্যানেলগুলো কার্ড আকারে যোগ করুন -->
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
<script>
    var video = document.getElementById('video');
    var hls = new Hls();

    function playChannel(url, name) {
        document.getElementById('channel-name').innerText = "এখন চলছে: " + name;
        hls.destroy();
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
        video.play();
    }
</script>

</body>
</html>
