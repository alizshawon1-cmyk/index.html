<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>My IPTV Player</title>
    <!-- Video.js এর CSS এবং JS ফাইল লোড করা -->
    <link href="https://vjs.zencdn.net/8.10.0/video-js.css" rel="stylesheet" />
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; background: #121212; color: white; }
        .player-container { width: 80%; max-width: 800px; margin-top: 20px; }
        .list-container { width: 80%; max-width: 800px; margin-top: 20px; background: #1e1e1e; padding: 15px; border-radius: 8px; }
        .channel-btn { display: block; width: 100%; padding: 10px; margin-bottom: 5px; cursor: pointer; background: #333; color: white; border: none; text-align: left; border-radius: 4px; }
        .channel-btn:hover { background: #555; }
    </style>
</head>
<body>

    <div class="player-container">
        <video id="my-video" class="video-js vjs-big-play-centered" controls preload="auto" width="800" height="450">
            <source src="http://180.94.28.28:8097//Nagorik-TV/index.fmp4.m3u8" type="application/x-mpegURL">
        </video>
    </div>

    <div class="list-container">
        <h3>চ্যানেল লিস্ট:</h3>
        <div id="buttons"></div>
    </div>

    <script src="https://vjs.zencdn.net/8.10.0/video.min.js"></script>
    <script>
        const player = videojs('my-video');
        const channels = [
            {name: "Nagorik TV", url: "http://180.94.28.28:8097//Nagorik-TV/index.fmp4.m3u8"},
            {name: "Gazi TV", url: "http://180.94.28.28:8097//GAZI-TV/index.fmp4.m3u8"},
            {name: "Star Jalsha", url: "http://180.94.28.28:8097//STAR-JALSHA/index.fmp4.m3u8"}
        ];

        const btnContainer = document.getElementById('buttons');
        channels.forEach(ch => {
            const btn = document.createElement('button');
            btn.className = 'channel-btn';
            btn.innerText = ch.name;
            btn.onclick = () => {
                player.src({src: ch.url, type: 'application/x-mpegURL'});
                player.play();
            };
            btnContainer.appendChild(btn);
        });
    </script>
</body>
</html>
