<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <title>U Complete TV Player</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        :root { --bg-color: #161b22; --accent-color: #e5b860; }
        body { background: #0b0e14; color: #fff; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 20px; display: flex; gap: 20px; justify-content: center; }
        .player-box { width: 65%; background: var(--bg-color); padding: 20px; border-radius: 12px; border: 1px solid #30363d; }
        .logo-header { text-align: center; font-size: 30px; font-weight: 800; color: var(--accent-color); margin-bottom: 20px; text-transform: uppercase; }
        #video { width: 100%; aspect-ratio: 16/9; background: #000; border-radius: 8px; }
        .channel-box { width: 35%; background: var(--bg-color); padding: 15px; border-radius: 12px; border: 1px solid #30363d; height: 80vh; overflow-y: auto; }
        .card { background: #21262d; padding: 12px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; text-align: center; border: 1px solid #30363d; color: var(--accent-color); }
        .card:hover { background: #30363d; }
    </style>
</head>
<body>

<div class="player-box">
    <div class="logo-header">U COMPLETE TV</div>
    <video id="video" controls autoplay></video>
</div>

<div class="channel-box">

<script>

    ];

    const video = document.getElementById('video');
    let hls = new Hls({
        // প্রক্সির মাধ্যমে সেগমেন্ট লোড করার জন্য এই সেটিংসটি জরুরি
        xhrSetup: function(xhr, url) {

        }
    });

    channels.forEach(ch => {
        const div = document.createElement('div');
        div.className = 'card';
        div.innerText = ch.name;
        div.onclick = () => {
            if (hls) hls.destroy();
            hls = new Hls({
                xhrSetup: function(xhr, url) {
                    xhr.open('GET', 'https://cz-pli2.hossainhridoy.workers.dev/proxy/' + url, true);

            });
            hls.loadSource(ch.url.split('/proxy/')[1]);
            hls.attachMedia(video);
            video.play();
        };
        document.getElementById('channelList').appendChild(div);
    });
</script>
</body>
</html>
